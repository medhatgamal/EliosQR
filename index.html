<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>صفحة الروابط</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: cairo, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eeee04, #ffaa00);
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 24px 20px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.3);
      max-width: 420px;
      width: 100%;
    }

    .logo {
      width: 120px;
      max-width: 60%;
      margin-bottom: 16px;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.2rem;
    }

    p {
      margin-top: 0;
      margin-bottom: 20px;
      color: #cbd5f5;
      font-size: 0.95rem;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4);
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.45);
    }

    .btn-secondary {
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.6);
    }

    .btn-secondary:hover {
      background: #020617;
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.7);
    }

    .icon {
      font-size: 1.2rem;
    }

    /* قسم السوشيال */
    .social-section {
      border-top: 1px solid rgba(148, 163, 184, 0.25);
      padding-top: 12px;
      margin-top: 4px;
    }

    .social-title {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      font-size: 1.3rem;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.7);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .social-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.8);
      opacity: 0.9;
    }

    .social-fb {
      background: #1877f2;
    }

    .social-ig {
      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285aeb 90%);
    }

    .social-yt {
      background: #ff0000;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .container {
        margin: 0;
        padding: 20px 16px;
        max-width: 100%;
      }

      h1 {
        font-size: 1.4rem;
      }

      h2 {
        font-size: 1.1rem;
      }

      p {
        font-size: 0.9rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn-link {
        width: 100%;
        justify-content: center;
        white-space: normal; /* عشان النص الطويل ما يطلعش بره الزرار */
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="elios_logo.png" alt="Elios Logo" class="logo" />

    <h1>Welocme To Elios</h1>
    <h2>مرحبًا بك في اليوس</h2>
    <p>اضغط على أي زر للانتقال إلى الصفحة المطلوبة.</p>

    <div class="buttons">
      <a
        class="btn-link btn-primary"
        href="https://www.elios.eg/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">🔗</span>
        <span>Elios Website</span>
        <span>موقع اليوس</span>
      </a>

      <a
        class="btn-link btn-secondary"
        href="https://eliosshop.com/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">🌐</span>
        <span>Elios Shop</span>
        <span>متجر اليوس</span>
      </a>
    </div>

    <div class="social-section">
      <div class="social-title">تابعنا على السوشيال ميديا</div>
      <div class="social-links">
        <a
          class="social-btn social-yt"
          href="https://www.youtube.com/channel/UC_gXQ365UQpF7bwQfuD734w"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="YouTube"
        >
          ▶
        </a>

        <a
          class="social-btn social-ig"
          href="https://www.instagram.com/eliosegypt/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
        >
          ♡
        </a>

        <a
          class="social-btn social-fb"
          href="https://www.facebook.com/eliosegypt"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Facebook"
        >
          f
        </a>
      </div>
    </div>
  </div>
</body>
</html>
