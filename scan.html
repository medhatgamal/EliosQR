<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>صفحة الروابط</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eeee04, #ffaa00);
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    h1 {
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    p {
      margin-top: 0;
      margin-bottom: 20px;
      color: #cbd5f5;
      font-size: 0.95rem;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4);
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.45);
    }

    .btn-secondary {
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.6);
    }

    .btn-secondary:hover {
      background: #020617;
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.7);
    }

    .icon {
      font-size: 1.2rem;
    }

    @media (max-width: 480px) {
      .container {
        margin: 16px;
        padding: 18px;
      }
      .buttons {
        flex-direction: column;
      }
      .btn-link {
        width: 100%;
        justify-content: center;
      }
    }
    .logo {
  width: 120px;          /* عدّل المقاس اللي يناسبك */
  margin-bottom: 16px;
}
  </style>
</head>
<body>
 
  


  <div class="container">
    <img src="elios_logo.png" alt="Elios Logo" class="logo" />
    <h1>Welocme To Elios </h1>
    <h2>مرحبآ بك في اليوس</h2>
    <p>اضغط على أي زر للانتقال إلى الصفحة المطلوبة.</p>

    <div class="buttons">
      <!-- غيّر الرابط والنص تحت حسب ما تحتاج -->
      <a
        class="btn-link btn-primary"
        href="https://www.elios.eg/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">🔗</span>
        <span>Elios Website</span>
        <span>موقع اليوس</span>
      </a>

      <a
        class="btn-link btn-secondary"
        href="https://eliosshop.com/"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="icon">🌐</span>
         <span>Elios Shop</span>
        <span>متجر اليوس</span>
      </a>
    </div>
  </div>
</body>
</html>
